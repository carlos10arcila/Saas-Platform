<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Symitar &middot; Projections</title>
<style>
/* ==========================================================================
   Design tokens (extracted from Figma: SYMITAR-MODULES, node 3:471)
   ========================================================================== */
:root {
  --color-page-bg: #f4f5f7;
  --color-sidebar-bg: #1a2035;
  --color-sidebar-icon-hover: rgba(255, 255, 255, 0.1);
  --color-sidebar-icon-active: rgba(255, 255, 255, 0.2);
  --color-sidebar-avatar-bg: #45556c;
  --color-nav-inactive-text: #cad5e2;

  --color-white: #ffffff;
  --color-border: #ebebeb;
  --color-border-strong: #d7d7d7;
  --color-row-alt: #f4f4f4;

  --color-text-primary: #2c2c2c;
  --color-text-secondary: #636363;
  --color-text-placeholder: #afafaf;

  --color-primary: #085ce5;
  --color-primary-border: #ecf5fe;
  --color-primary-hover: #0748b8;
  --color-danger: #ff6467;
  --color-check-blue: #0075ff;
  --color-highlight-bg: #fff3c4;
  --color-highlight-border: #f5d90a;

  --radius-card: 14px;
  --radius-control: 8px;
  --radius-button: 10px;
  --radius-chip: 4px;
  --radius-pill: 999px;

  --font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;

  --shadow-card: 0px 1px 1.5px rgba(0, 0, 0, 0.1), 0px 1px 1px rgba(0, 0, 0, 0.1);
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  font-family: var(--font-family);
  color: var(--color-text-primary);
  background: var(--color-page-bg);
  -webkit-font-smoothing: antialiased;
}

button {
  font-family: inherit;
  cursor: pointer;
}

input,
select,
button {
  font-family: inherit;
  font-size: 14px;
}

svg {
  display: block;
}

.icon {
  width: 16px;
  height: 16px;
  display: block;
}

.icon img,
.icon svg {
  width: 100%;
  height: 100%;
}

/* ==========================================================================
   App shell
   ========================================================================== */
.app-shell {
  display: flex;
  min-height: 100vh;
}

/* --- Left dark icon rail --- */
.icon-rail {
  width: 48px;
  flex-shrink: 0;
  background: var(--color-sidebar-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 6px;
  min-height: 100vh;
}

.icon-rail__logo {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-chip);
  margin-bottom: 16px;
  color: #fff;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: -0.3px;
}

.icon-rail__group {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.icon-rail__spacer {
  flex: 1;
}

.icon-rail__btn {
  width: 36px;
  height: 36px;
  border: 0;
  background: transparent;
  border-radius: var(--radius-chip);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}

.icon-rail__btn .icon {
  width: 16px;
  height: 16px;
}

.icon-rail__btn:hover {
  background: var(--color-sidebar-icon-hover);
}

.icon-rail__btn.is-active {
  background: var(--color-sidebar-icon-active);
}

.icon-rail__btn.is-round {
  border-radius: var(--radius-pill);
  background: var(--color-sidebar-avatar-bg);
  overflow: hidden;
}

.icon-rail__bottom {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* --- Right column: header + page --- */
.main-column {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.topbar {
  background: var(--color-sidebar-bg);
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 12px 16px;
}

.topbar__brand {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.topbar__brand .icon {
  width: 22px;
  height: 22px;
}

.topbar__brand-name {
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.2px;
}

.topbar__nav {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
}

.topbar__nav-item {
  border: 0;
  background: transparent;
  border-radius: var(--radius-chip);
  padding: 6px 12px;
  color: var(--color-nav-inactive-text);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: -0.15px;
  white-space: nowrap;
}

.topbar__nav-item.is-active {
  color: #fff;
}

.topbar__actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.topbar__icon-btn {
  width: 32px;
  height: 32px;
  border: 0;
  background: transparent;
  border-radius: var(--radius-chip);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}

.topbar__icon-btn.is-active {
  background: var(--color-sidebar-icon-active);
}

/* --- Page --- */
.page {
  flex: 1;
  padding: 32px 32px 48px;
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
}

.page-header {
  margin-bottom: 24px;
}

.page-header h1 {
  margin: 0 0 4px;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.page-header p {
  margin: 0;
  color: var(--color-text-secondary);
  font-size: 14px;
}

.content-row {
  display: flex;
  align-items: flex-start;
  gap: 24px;
}

/* --- Route sidebar (left card nav) --- */
.route-sidebar {
  width: 208px;
  flex-shrink: 0;
  background: var(--color-white);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 13px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.route-sidebar__item {
  border: 0;
  background: transparent;
  border-radius: 8px;
  padding: 10px 12px;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.route-sidebar__item + .route-sidebar__item {
  margin-top: 4px;
}

.route-sidebar__item.is-active {
  background: var(--color-row-alt);
}

.route-sidebar__item-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-secondary);
  letter-spacing: -0.15px;
}

.route-sidebar__item.is-active .route-sidebar__item-title {
  color: var(--color-text-primary);
}

.route-sidebar__item-sub {
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-secondary);
}

/* --- Main content column --- */
.main-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

/* ==========================================================================
   Panel (card) shared styles
   ========================================================================== */
.panel {
  background: var(--color-white);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
}

.panel + .panel {
  margin-top: 16px;
}

.panel__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px 13px;
  border-bottom: 1px solid var(--color-border);
}

.panel__title {
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-primary);
  letter-spacing: -0.15px;
}

.panel__header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.panel__body {
  padding: 16px 20px;
}

.panel__footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
  padding: 17px 20px 16px;
  border-top: 1px solid var(--color-border);
}

/* Buttons */
.btn {
  border-radius: var(--radius-button);
  border: 1px solid transparent;
  padding: 9px 17px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.15px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  line-height: 20px;
}

.btn-secondary {
  background: var(--color-white);
  border-color: var(--color-border);
  color: var(--color-text-secondary);
}

.btn-secondary:hover {
  background: var(--color-row-alt);
}

.btn-primary {
  background: var(--color-primary);
  color: #fff;
  padding: 8px 20px;
}

.btn-primary:hover {
  background: var(--color-primary-hover);
}

.btn-primary:disabled {
  background: #cbd5e1;
  color: #f1f5f9;
  cursor: not-allowed;
}

.btn-outline-blue {
  background: var(--color-white);
  border-color: var(--color-primary-border);
  color: var(--color-primary);
  padding: 7px 13px;
  font-size: 12px;
  border-radius: var(--radius-button);
}

.btn-outline-blue:hover {
  background: var(--color-primary-border);
}

.btn-small {
  padding: 7px 13px;
  font-size: 12px;
  border-radius: var(--radius-button);
}

/* ==========================================================================
   Form fields
   ========================================================================== */
.field-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.field-grid--full {
  grid-template-columns: 1fr;
}

.field-section + .field-section {
  margin-top: 16px;
}

.field-section__label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--color-text-secondary);
  margin: 0 0 12px;
  padding-top: 4px;
  border-top: 1px solid var(--color-border);
  padding-top: 16px;
}

.field {
  display: flex;
  flex-direction: column;
}

.field__label-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 4px;
}

.field__label {
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-secondary);
}

.field__required {
  color: var(--color-danger);
  font-size: 12px;
  font-weight: 500;
}

.field__lock-icon {
  width: 12px;
  height: 12px;
  opacity: 0.7;
}

.field__control-wrap {
  position: relative;
}

.field__control {
  width: 100%;
  height: 38px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-control);
  padding: 9px 13px;
  font-size: 14px;
  color: var(--color-text-primary);
  background: var(--color-white);
  letter-spacing: -0.15px;
}

.field__control::placeholder {
  color: var(--color-text-placeholder);
}

.field__control:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(8, 92, 229, 0.12);
}

.field__control.has-icon-left {
  padding-left: 33px;
}

.field__control.has-icon-right,
select.field__control {
  padding-right: 33px;
  appearance: none;
  -webkit-appearance: none;
}

.field__icon-left,
.field__icon-right {
  position: absolute;
  top: 12px;
  width: 14px;
  height: 14px;
  color: var(--color-text-secondary);
  pointer-events: none;
}

.field__icon-left {
  left: 12px;
}

.field__icon-right {
  right: 12px;
}

.field__control[readonly],
.field__control.is-readonly,
select.field__control:disabled {
  background: var(--color-row-alt);
  border: 1px dashed var(--color-border-strong);
  color: var(--color-text-secondary);
  cursor: not-allowed;
}

.field__control.is-invalid {
  border-color: var(--color-danger);
}

.field__error {
  margin-top: 4px;
  font-size: 11px;
  color: var(--color-danger);
}

/* Combobox (searchable dropdown) */
.combobox {
  position: relative;
}

.combobox__list {
  position: absolute;
  z-index: 20;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  max-height: 260px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-control);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  padding: 4px;
  display: none;
}

.combobox.is-open .combobox__list {
  display: block;
}

.combobox__option {
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 6px;
  color: var(--color-text-primary);
  cursor: pointer;
}

.combobox__option:hover,
.combobox__option.is-highlighted {
  background: var(--color-row-alt);
}

.combobox__empty {
  padding: 10px;
  font-size: 13px;
  color: var(--color-text-secondary);
}

/* ==========================================================================
   Results panel
   ========================================================================== */
.results-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--color-text-secondary);
  font-size: 14px;
}

.results-narrative {
  border-left: 2px solid rgba(8, 92, 229, 0.3);
  padding-left: 14px;
  font-style: italic;
  color: var(--color-text-secondary);
  font-size: 14px;
  line-height: 20px;
  margin: 0 0 16px;
}

.results-disclaimer {
  border-left: 2px solid rgba(255, 100, 103, 0.4);
  padding-left: 14px;
  font-style: italic;
  color: var(--color-text-secondary);
  font-size: 13px;
  line-height: 19px;
  margin: 0 0 16px;
}

.results-title {
  font-size: 16px;
  font-weight: 600;
  margin: 0 0 16px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.summary-card {
  background: var(--color-row-alt);
  border: 1px solid var(--color-border);
  border-radius: 10px;
  padding: 13px 17px;
}

.summary-card.is-highlighted {
  background: var(--color-highlight-bg);
  border-color: var(--color-highlight-border);
}

.summary-card__label {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin: 0 0 4px;
}

.summary-card__value {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-primary);
  margin: 0;
}

.results-section-heading {
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin: 20px 0 12px;
}

.results-section-heading:first-child {
  margin-top: 0;
}

.detail-list {
  list-style: none;
  margin: 0 0 16px;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.detail-list li {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid var(--color-border);
}

.detail-list li span:first-child {
  color: var(--color-text-secondary);
}

.detail-list li span:last-child {
  font-weight: 600;
  color: var(--color-text-primary);
}

.schedule-wrap {
  border: 1px solid var(--color-border);
  border-radius: 10px;
  overflow: hidden;
}

.schedule-header {
  background: var(--color-row-alt);
  border-bottom: 1px solid var(--color-border);
  padding: 10px 16px 11px;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-secondary);
  letter-spacing: 0.3px;
}

.schedule-scroll {
  max-height: 288px;
  overflow-y: auto;
}

.schedule-table {
  width: 100%;
  min-width: 640px;
  border-collapse: collapse;
  font-size: 12px;
}

.schedule-table thead th {
  position: sticky;
  top: 0;
  background: var(--color-row-alt);
  border-bottom: 1px solid var(--color-border);
  text-align: left;
  font-weight: 500;
  color: var(--color-text-secondary);
  letter-spacing: 0.3px;
  padding: 9px 12px;
  white-space: nowrap;
}

.schedule-table thead th:last-child {
  text-align: right;
}

.schedule-table tbody td {
  padding: 9.5px 12px;
  border-bottom: 1px solid var(--color-border);
  color: var(--color-text-secondary);
  white-space: nowrap;
}

.schedule-table tbody td:last-child {
  text-align: right;
  font-weight: 500;
  color: var(--color-text-primary);
}

.schedule-table tbody tr:nth-child(even) {
  background: var(--color-row-alt);
}

.checkbox-field {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-secondary);
  cursor: pointer;
}

.checkbox-field input[type="checkbox"] {
  width: 13px;
  height: 13px;
  accent-color: var(--color-check-blue);
  cursor: pointer;
}

.is-hidden {
  display: none !important;
}

/* ==========================================================================
   Responsive
   ========================================================================== */
@media (max-width: 900px) {
  .content-row {
    flex-direction: column;
  }
  .route-sidebar {
    width: 100%;
    flex-direction: row;
    flex-wrap: wrap;
  }
  .route-sidebar__item {
    width: calc(50% - 4px);
  }
}

@media (max-width: 640px) {
  .field-grid {
    grid-template-columns: 1fr;
  }
  .page {
    padding: 16px;
  }
}

/* ==========================================================================
   Print
   ========================================================================== */
@media print {
  .icon-rail,
  .topbar,
  .route-sidebar,
  .panel.input-panel,
  .panel__header-actions {
    display: none !important;
  }
  .page {
    padding: 0;
    max-width: none;
  }
  .panel {
    box-shadow: none;
    border: none;
  }
}
</style>

// Populate every static [data-icon] placeholder in the shell. If the host
// element doesn't already carry the ".icon" sizing class itself (e.g. it IS
// an .icon span), stamp the class directly onto the injected <svg> root so
// it gets constrained to 16x16 instead of the browser's default SVG size.
document.querySelectorAll("[data-icon]").forEach((el) => {
  const key = el.getAttribute("data-icon");
  if (!ICONS[key]) return;
  el.innerHTML = ICONS[key];
  if (!el.classList.contains("icon")) {
    const svg = el.querySelector("svg");
    if (svg) svg.setAttribute("class", "icon");
  }
});

// Builds an inline <svg> element (as an actual DOM node) from an ICONS entry,
// with the given class applied directly to the <svg> root for CSS sizing.
function svgIcon(key, className) {
  const holder = document.createElement("div");
  holder.innerHTML = ICONS[key];
  const svg = holder.firstElementChild;
  if (className) svg.setAttribute("class", className);
  return svg;
}
</script>

function frequencyLabel(freq) {
  if (!freq) return "monthly";
  const map = {
    "04 Monthly": "monthly",
    "02 Bi-Weekly": "bi-weekly",
    "01 Weekly": "weekly",
    "12 Annually": "annually",
    "03 Semi-Monthly": "semi-monthly"
  };
  return map[freq] || freq.toLowerCase();
}

function money(val) {
  const n = parseFloat(String(val).replace(/[^0-9.-]/g, ""));
  if (isNaN(n)) return "$0.00";
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

<script>
// Numeric input masking: only digits, decimal points, and slashes are
// permitted anywhere in the Projections module (per spec: "Input Masking").

const MASK_ALLOWED_KEYS = new Set([
  "Backspace", "Delete", "Tab", "Escape", "Enter",
  "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Home", "End"
]);

function isMaskAllowedChar(ch) {
  return /[0-9.\/]/.test(ch);
}

function attachNumericMask(input) {
  input.addEventListener("keydown", (e) => {
    if (e.ctrlKey || e.metaKey || MASK_ALLOWED_KEYS.has(e.key)) return;
    if (e.key.length === 1 && !isMaskAllowedChar(e.key)) {
      e.preventDefault();
    }
  });
  input.addEventListener("paste", (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text");
    const cleaned = text.replace(/[^0-9.\/]/g, "");
    document.execCommand("insertText", false, cleaned);
  });
  input.addEventListener("input", () => {
    if (/[^0-9.\/]/.test(input.value)) {
      input.value = input.value.replace(/[^0-9.\/]/g, "");
    }
  });
}
</script>

<script>
// Searchable type-ahead combobox used for Loan Type / Share Type fields.
// wrapperEl must contain: input.field__control, div.combobox__list

function initCombobox(wrapperEl, options, initialValue, onChange) {
  const input = wrapperEl.querySelector(".field__control");
  const list = wrapperEl.querySelector(".combobox__list");
  let highlighted = -1;
  let filtered = options.slice();

  input.value = initialValue || "";

  function renderList() {
    list.innerHTML = "";
    if (filtered.length === 0) {
      const empty = document.createElement("div");
      empty.className = "combobox__empty";
      empty.textContent = "No matches found";
      list.appendChild(empty);
      return;
    }
    filtered.forEach((opt, i) => {
      const item = document.createElement("div");
      item.className = "combobox__option" + (i === highlighted ? " is-highlighted" : "");
      item.textContent = opt;
      item.addEventListener("mousedown", (e) => {
        e.preventDefault();
        select(opt);
      });
      list.appendChild(item);
    });
  }

  function open() {
    wrapperEl.classList.add("is-open");
    renderList();
  }

  function close() {
    wrapperEl.classList.remove("is-open");
    highlighted = -1;
  }

  function filter() {
    const q = input.value.trim().toUpperCase();
    filtered = q ? options.filter((o) => o.includes(q)) : options.slice();
    highlighted = -1;
    renderList();
  }

  function select(value) {
    input.value = value;
    close();
    if (onChange) onChange(value);
    input.dispatchEvent(new Event("change", { bubbles: true }));
  }

  input.addEventListener("focus", () => {
    filter();
    open();
  });

  input.addEventListener("input", () => {
    filter();
    open();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      if (!wrapperEl.classList.contains("is-open")) return open();
      highlighted = Math.min(highlighted + 1, filtered.length - 1);
      renderList();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      highlighted = Math.max(highlighted - 1, 0);
      renderList();
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (highlighted >= 0 && filtered[highlighted]) select(filtered[highlighted]);
    } else if (e.key === "Escape") {
      close();
    }
  });

  document.addEventListener("click", (e) => {
    if (!wrapperEl.contains(e.target)) close();
  });

  return {
    getValue: () => input.value,
    setValue: (v) => {
      input.value = v;
    }
  };
}
</script>

<script>
// Renders Zone 2 (Input Parameters panel) from a route config, and manages
// form state, masking, required-field validation, and conditional sections.

const FormRenderer = (function () {
  function isPlaceholderDefault(def) {
    if (def == null) return false;
    return /^_+(\/_+)*$/.test(def) || def === "MM/DD/YYYY";
  }

  function isFieldFilled(fieldCfg, rawValue) {
    const val = (rawValue || "").trim();
    if (!val) return false;
    if (fieldCfg.type === "date") {
      return !isPlaceholderDefault(val);
    }
    if (fieldCfg.type === "currency" || fieldCfg.type === "percent") {
      const n = parseFloat(val.replace(/[^0-9.-]/g, ""));
      return !isNaN(n) && n > 0;
    }
    return true;
  }

  function buildLabelRow(fieldCfg) {
    const row = document.createElement("div");
    row.className = "field__label-row";

    const label = document.createElement("span");
    label.className = "field__label";
    label.textContent = fieldCfg.label;
    row.appendChild(label);

    if (fieldCfg.required) {
      const star = document.createElement("span");
      star.className = "field__required";
      star.textContent = "*";
      row.appendChild(star);
    }
    if (fieldCfg.readOnly) {
      row.appendChild(svgIcon("fieldLock", "field__lock-icon"));
    }
    return row;
  }

  function buildControl(fieldCfg) {
    const wrap = document.createElement("div");
    wrap.className = "field__control-wrap";

    if (fieldCfg.type === "select") {
      const select = document.createElement("select");
      select.className = "field__control";
      select.id = "field-" + fieldCfg.id;
      select.disabled = !!fieldCfg.readOnly;
      (fieldCfg.options || []).forEach((opt) => {
        const o = document.createElement("option");
        o.value = opt;
        o.textContent = opt;
        if (opt === fieldCfg.default) o.selected = true;
        select.appendChild(o);
      });
      wrap.appendChild(select);
      wrap.appendChild(svgIcon("fieldChevron", "field__icon-right icon"));
      return { wrap, control: select };
    }

    if (fieldCfg.type === "combobox") {
      wrap.classList.add("combobox");
      const input = document.createElement("input");
      input.type = "text";
      input.className = "field__control has-icon-left has-icon-right";
      input.id = "field-" + fieldCfg.id;
      input.placeholder = fieldCfg.placeholder || "";
      input.autocomplete = "off";
      wrap.appendChild(input);

      wrap.appendChild(svgIcon("fieldSearch", "field__icon-left icon"));
      wrap.appendChild(svgIcon("fieldChevron", "field__icon-right icon"));

      const list = document.createElement("div");
      list.className = "combobox__list";
      wrap.appendChild(list);

      return { wrap, control: input, isCombobox: true };
    }

    // text / currency / percent / date all render as masked text inputs
    const input = document.createElement("input");
    input.type = "text";
    input.className = "field__control";
    input.id = "field-" + fieldCfg.id;
    input.readOnly = !!fieldCfg.readOnly;
    if (fieldCfg.readOnly) input.classList.add("is-readonly");

    if (isPlaceholderDefault(fieldCfg.default)) {
      input.placeholder = fieldCfg.default;
      input.value = "";
    } else {
      input.value = fieldCfg.default != null ? fieldCfg.default : "";
    }

    wrap.appendChild(input);
    return { wrap, control: input };
  }

  function buildField(fieldCfg, state) {
    const field = document.createElement("div");
    field.className = "field";
    field.appendChild(buildLabelRow(fieldCfg));

    const { wrap, control, isCombobox } = buildControl(fieldCfg);
    field.appendChild(wrap);

    const error = document.createElement("div");
    error.className = "field__error is-hidden";
    error.textContent = fieldCfg.validationMsg || "This field is required.";
    field.appendChild(error);

    if (!fieldCfg.readOnly) {
      if (fieldCfg.type === "text" || fieldCfg.type === "currency" || fieldCfg.type === "date") {
        attachNumericMask(control);
      } else if (fieldCfg.type === "percent") {
        attachNumericMask(control);
        control.addEventListener("focus", () => {
          control.value = control.value.replace("%", "");
        });
        control.addEventListener("blur", () => {
          const raw = control.value.trim();
          if (raw === "") return;
          const n = parseFloat(raw);
          if (!isNaN(n)) control.value = n.toFixed(3) + "%";
        });
      }
    }

    if (isCombobox) {
      initCombobox(wrap, fieldCfg.options, fieldCfg.default, () => state.notifyChange());
    }

    state.fields[fieldCfg.id] = { cfg: fieldCfg, control, wrap, errorEl: error };
    return field;
  }

  function buildGrid(fieldsCfg, state) {
    const grid = document.createElement("div");
    grid.className = "field-grid";
    fieldsCfg.forEach((f) => grid.appendChild(buildField(f, state)));
    return grid;
  }

  function render(route, container, onCalculate) {
    container.innerHTML = "";
    const state = { fields: {}, notifyChange: () => updateValidity() };

    const header = document.createElement("div");
    header.className = "panel__header";

    const title = document.createElement("div");
    title.className = "panel__title";
    title.textContent = "Input Parameters";
    header.appendChild(title);

    const actions = document.createElement("div");
    actions.className = "panel__header-actions";
    header.appendChild(actions);

    let advancedToggleBtn = null;
    if (route.hasToggle) {
      advancedToggleBtn = document.createElement("button");
      advancedToggleBtn.type = "button";
      advancedToggleBtn.className = "btn btn-outline-blue";
      advancedToggleBtn.textContent = "Advanced View";
      actions.appendChild(advancedToggleBtn);
    }

    const body = document.createElement("div");
    body.className = "panel__body";

    if (route.secondaryDropdown) {
      const row = document.createElement("div");
      row.className = "field-grid field-grid--full";
      row.style.marginBottom = "16px";
      row.appendChild(buildField(route.secondaryDropdown, state));
      body.appendChild(row);
    }

    body.appendChild(buildGrid(route.basicFields || [], state));

    let advancedSection = null;
    if (route.advancedFields && route.advancedFields.length) {
      advancedSection = document.createElement("div");
      advancedSection.className = "field-section is-hidden";
      advancedSection.appendChild(buildGrid(route.advancedFields, state));
      body.appendChild(advancedSection);
    }

    let conditionalSection = null;
    if (route.conditionalSection) {
      conditionalSection = document.createElement("div");
      conditionalSection.className = "field-section is-hidden";
      const label = document.createElement("p");
      label.className = "field-section__label";
      label.textContent = route.conditionalSection.label;
      conditionalSection.appendChild(label);
      conditionalSection.appendChild(buildGrid(route.conditionalSection.fields, state));
      body.appendChild(conditionalSection);
    }

    const footer = document.createElement("div");
    footer.className = "panel__footer";

    const clearBtn = document.createElement("button");
    clearBtn.type = "button";
    clearBtn.className = "btn btn-secondary";
    clearBtn.textContent = "Clear";
    footer.appendChild(clearBtn);

    const calcBtn = document.createElement("button");
    calcBtn.type = "button";
    calcBtn.className = "btn btn-primary";
    calcBtn.textContent = "Calculate";
    footer.appendChild(calcBtn);

    container.appendChild(header);
    container.appendChild(body);
    container.appendChild(footer);

    function getValues() {
      const values = {};
      Object.keys(state.fields).forEach((id) => {
        values[id] = state.fields[id].control.value;
      });
      return values;
    }

    function updateConditionalVisibility() {
      if (!route.conditionalSection || !conditionalSection) return;
      const cond = route.conditionalSection.showWhen;
      const entry = state.fields[cond.field];
      const currentVal = entry ? entry.control.value : "";
      const show = currentVal === cond.equals;
      conditionalSection.classList.toggle("is-hidden", !show);
    }

    function updateValidity() {
      let allValid = true;
      Object.values(state.fields).forEach(({ cfg, control, errorEl }) => {
        if (!cfg.required) return;
        const filled = isFieldFilled(cfg, control.value);
        control.classList.toggle("is-invalid", !filled);
        errorEl.classList.toggle("is-hidden", filled);
        if (!filled) allValid = false;
      });
      calcBtn.disabled = !allValid;
      updateConditionalVisibility();
    }

    body.addEventListener("input", updateValidity);
    body.addEventListener("change", updateValidity);

    if (advancedToggleBtn && advancedSection) {
      advancedToggleBtn.addEventListener("click", () => {
        const nowHidden = advancedSection.classList.toggle("is-hidden");
        advancedToggleBtn.textContent = nowHidden ? "Advanced View" : "Basic View";
      });
    }

    clearBtn.addEventListener("click", () => {
      render(route, container, onCalculate);
    });

    calcBtn.addEventListener("click", () => {
      if (calcBtn.disabled) return;
      onCalculate(getValues());
    });

    updateValidity();

    function setFieldValue(id, value) {
      const entry = state.fields[id];
      if (entry) entry.control.value = value;
    }

    function allFieldConfigs() {
      return [
        ...(route.secondaryDropdown ? [route.secondaryDropdown] : []),
        ...(route.basicFields || []),
        ...(route.advancedFields || []),
        ...(route.conditionalSection ? route.conditionalSection.fields : [])
      ];
    }

    return { getValues, setFieldValue, allFieldConfigs };
  }

  return { render, isFieldFilled, isPlaceholderDefault };
})();
</script>

<script>
// Stand-in projection math. These are simplified, generally-accepted
// financial formulas used to populate the Results panel for demo purposes.
// They are NOT the authoritative Symitar calculation engine (day-count
// conventions, DQ bucket rules, etc. are intentionally out of scope).

const Calc = (function () {
  const DEMO_FALLBACK_RATE = 0.04; // used only when a rate field is system-populated at 0

  function num(v) {
    const n = parseFloat(String(v == null ? "" : v).replace(/[^0-9.-]/g, ""));
    return isNaN(n) ? 0 : n;
  }

  function pct(v) {
    return num(v) / 100;
  }

  function parseDate(str) {
    if (!str) return null;
    const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (!m) return null;
    let [, mo, da, yr] = m;
    if (yr.length === 2) yr = "20" + yr;
    const d = new Date(parseInt(yr, 10), parseInt(mo, 10) - 1, parseInt(da, 10));
    return isNaN(d.getTime()) ? null : d;
  }

  function addMonths(date, n) {
    const d = new Date(date.getTime());
    d.setMonth(d.getMonth() + n);
    return d;
  }

  function addYears(date, n) {
    const d = new Date(date.getTime());
    d.setFullYear(d.getFullYear() + n);
    return d;
  }

  function fmtDate(d) {
    if (!d) return "—";
    return `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`;
  }

  function periodsPerYear(freqLabel) {
    if (!freqLabel) return 12;
    if (/weekly/i.test(freqLabel) && !/bi-/i.test(freqLabel)) return 52;
    if (/bi-weekly/i.test(freqLabel)) return 26;
    if (/semi-monthly/i.test(freqLabel)) return 24;
    if (/monthly/i.test(freqLabel)) return 12;
    if (/quarterly/i.test(freqLabel)) return 4;
    if (/annually/i.test(freqLabel)) return 1;
    return 12;
  }

  // ---------------------------------------------------------------- Route 1
  function loan(v) {
    const principal = num(v.loanAmount);
    const months = Math.max(1, Math.round(num(v.loanMonths)) || 36);
    const annualRate = pct(v.interestRate);
    const monthlyRate = annualRate / 12;
    const loanDate = parseDate(v.loanDate) || new Date();

    const payment =
      monthlyRate > 0
        ? (principal * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -months))
        : principal / months;

    let balance = principal;
    const schedule = [];
    let totalInterest = 0;
    for (let i = 1; i <= months; i++) {
      const interest = balance * monthlyRate;
      let principalPortion = payment - interest;
      let pmtAmount = payment;
      if (i === months || principalPortion > balance) {
        principalPortion = balance;
        pmtAmount = principalPortion + interest;
      }
      balance = Math.max(0, balance - principalPortion);
      totalInterest += interest;
      schedule.push({
        Pmt: i,
        Date: fmtDate(addMonths(loanDate, i)),
        Amount: money(pmtAmount),
        "Sales Tax": money(0),
        Escrow: money(0),
        "Billed Fee": money(0),
        Principal: money(principalPortion),
        Interest: money(interest),
        Balance: money(balance)
      });
    }
    const finalRow = schedule[schedule.length - 1];

    return {
      standardPayment: payment,
      paymentCount: months,
      firstPaymentDate: fmtDate(addMonths(loanDate, 1)),
      finalPayment: num(finalRow.Amount),
      finalPaymentDate: finalRow.Date,
      totalInterest,
      totalOfPayments: principal + totalInterest,
      schedule
    };
  }

  // ---------------------------------------------------------------- Route 2
  function ira(v) {
    const annualContribution = num(v.annualContribution);
    const rate = pct(v.dividendRate) || DEMO_FALLBACK_RATE;
    const n = periodsPerYear(v.dividendFrequency);
    const contribYears = Math.max(1, Math.round(num(v.contributionYears)) || 30);
    const distYears = Math.max(1, Math.round(num(v.distributionYears)) || 22);

    function futureValue(years) {
      const periods = years * n;
      const periodicRate = rate / n;
      const contribPerPeriod = annualContribution / n;
      if (periodicRate === 0) return contribPerPeriod * periods;
      return contribPerPeriod * ((Math.pow(1 + periodicRate, periods) - 1) / periodicRate);
    }

    const totalContributed = annualContribution * contribYears;
    const totalValue = futureValue(contribYears);
    const monthlyDistribution = totalValue / (distYears * 12);
    const totalDistributed = monthlyDistribution * distYears * 12;

    const birthdate = parseDate(v.birthdate);
    const startDate = parseDate(v.startDate) || new Date();
    const currentAge = birthdate
      ? startDate.getFullYear() - birthdate.getFullYear()
      : 30;

    const milestones = [];
    for (let y = 5; y <= contribYears; y += 5) {
      const val = futureValue(y);
      milestones.push({
        Time: `${y} Years`,
        "Total Value": money(val),
        "Avail less 0 day penalty": money(val)
      });
    }

    const schedule = [];
    for (let y = 1; y <= contribYears; y++) {
      schedule.push({
        Year: y,
        Month: 12,
        Action: "Contribution",
        Amount: money(annualContribution),
        "Account Value": money(futureValue(y))
      });
    }
    let distBalance = totalValue;
    for (let d = 1; d <= distYears; d++) {
      distBalance = Math.max(0, distBalance - monthlyDistribution * 12);
      schedule.push({
        Year: contribYears + d,
        Month: 12,
        Action: "Distribution",
        Amount: money(monthlyDistribution * 12),
        "Account Value": money(distBalance)
      });
    }

    return {
      totalContributed,
      totalValue,
      monthlyDistribution,
      totalDistributed,
      at60: futureValue(Math.max(1, 60 - currentAge)),
      at65: futureValue(Math.max(1, 65 - currentAge)),
      at70: futureValue(Math.max(1, 70 - currentAge)),
      milestones,
      schedule
    };
  }

  // ---------------------------------------------------------------- Route 3
  const UNIFORM_LIFETIME_DIVISORS = {
    72: 27.4, 73: 26.5, 74: 25.5, 75: 24.6, 76: 23.7, 77: 22.9, 78: 22.0,
    79: 21.1, 80: 20.2, 81: 19.4, 82: 18.5, 83: 17.7, 84: 16.8, 85: 16.0,
    86: 15.2, 87: 14.4, 88: 13.7, 89: 12.9, 90: 12.2
  };

  function iraRmd(v) {
    const birthdate = parseDate(v.ownerBirthdate);
    const thisYear = new Date().getFullYear();
    const birthYear = birthdate ? birthdate.getFullYear() : thisYear - 73;
    let distributionBeginYear = birthYear + 73;
    if (distributionBeginYear < thisYear) distributionBeginYear = thisYear;
    const ownerAge = distributionBeginYear - birthYear;
    const divisor = UNIFORM_LIFETIME_DIVISORS[ownerAge] || 24.7;

    return {
      distributionBeginYear,
      ownerAge,
      mdibDivisor: divisor.toFixed(1)
    };
  }

  // ---------------------------------------------------------------- Route 4
  function dividend(v) {
    const opening = num(v.openingBalance);
    const deposit = num(v.depositAmount);
    const rate = pct(v.dividendFillInRate) || DEMO_FALLBACK_RATE;
    const n = periodsPerYear(v.depositFrequency);
    const termMonths = Math.max(1, Math.round(num(v.maturityTermPeriod)) || 12);
    const periods = Math.max(1, Math.round((termMonths / 12) * n));
    const startDate = parseDate(v.depositStartDate) || new Date();
    const periodicRate = rate / n;

    let balance = opening;
    const schedule = [];
    let totalDeposited = 0;
    let totalDividend = 0;
    const stepMonths = 12 / n;

    for (let i = 1; i <= periods; i++) {
      balance += deposit;
      totalDeposited += deposit;
      schedule.push({
        Date: fmtDate(addMonths(startDate, Math.round(i * stepMonths))),
        Description: "Deposit",
        Amount: money(deposit),
        "New Balance": money(balance)
      });
      const div = balance * periodicRate;
      if (div > 0) {
        balance += div;
        totalDividend += div;
        schedule.push({
          Date: fmtDate(addMonths(startDate, Math.round(i * stepMonths))),
          Description: "Dividend",
          Amount: money(div),
          "New Balance": money(balance)
        });
      }
    }

    return {
      totalDeposited,
      totalDividend,
      totalFinalBalance: balance,
      calculatedThrough: fmtDate(addMonths(startDate, termMonths)),
      schedule
    };
  }

  // ---------------------------------------------------------------- Route 5
  function apy(v) {
    const startBalance = num(v.startBalance);
    const rate = pct(v.dividendFillInRate) || DEMO_FALLBACK_RATE;
    const termMonths = Math.max(1, Math.round(num(v.maturityTermPeriod)) || 12);
    const n = 365;
    const days = Math.round((termMonths / 12) * 365);
    const startDate = parseDate(v.startDate) || new Date();

    const apyValue = Math.pow(1 + rate / n, n) - 1;
    const totalFinalBalance = startBalance * Math.pow(1 + rate / n, days);
    const totalDividend = totalFinalBalance - startBalance;

    const schedule = [
      {
        Date: fmtDate(startDate),
        Description: "Opening Balance",
        Amount: money(startBalance),
        "New Balance": money(startBalance)
      },
      {
        Date: fmtDate(addMonths(startDate, termMonths)),
        Description: "Dividend",
        Amount: money(totalDividend),
        "New Balance": money(totalFinalBalance)
      }
    ];

    return {
      totalDividend,
      totalFinalBalance,
      calculatedThrough: fmtDate(addMonths(startDate, termMonths)),
      daysInCalculation: days,
      apy: (apyValue * 100).toFixed(3) + "%",
      dividendCalcMethod: "Average Daily Balance",
      postAverageBalanceComment: "Dividends compounded daily and credited at maturity.",
      tiers: [{ label: "All Balances", rate: (rate * 100).toFixed(3) + "%" }],
      schedule
    };
  }

  // ---------------------------------------------------------------- Route 6
  function reverseApy(v) {
    const apyValue = pct(v.annualPercentageYield);
    const compoundingMap = {
      "0 Daily Compounding": 365,
      "1 Monthly Compounding": 12,
      "2 Quarterly Compounding": 4,
      "3 Annual Compounding": 1
    };
    const n = compoundingMap[v.compounding] || 365;
    const nominal = n * (Math.pow(1 + apyValue, 1 / n) - 1);
    return {
      approximateDividendRate: (nominal * 100).toFixed(3) + "%"
    };
  }

  function money(val) {
    const n = num(val);
    return n.toFixed(2);
  }

  const HANDLERS = {
    loan, ira, "ira-rmd": iraRmd, dividend, apy, "reverse-apy": reverseApy
  };

  function compute(routeId, values) {
    const handler = HANDLERS[routeId];
    return handler ? handler(values) : {};
  }

  return { compute, fmtDate, parseDate, addMonths, addYears, num, pct };
})();
</script>

<script>
// Renders Zone 3 (Results panel): empty state, then narrative/summary/
// specifications/results/tables once Calculate has produced a result object.

const ResultsRenderer = (function () {
  function buildHeader(route, onToggleSchedule, onPrint) {
    const header = document.createElement("div");
    header.className = "panel__header";

    const title = document.createElement("div");
    title.className = "panel__title";
    title.textContent = "Results";
    header.appendChild(title);

    const actions = document.createElement("div");
    actions.className = "panel__header-actions";

    if (route.results.hasFullSchedule) {
      const label = document.createElement("label");
      label.className = "checkbox-field";
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = true;
      checkbox.addEventListener("change", () => onToggleSchedule(checkbox.checked));
      label.appendChild(checkbox);
      label.appendChild(document.createTextNode("Full Schedule"));
      actions.appendChild(label);
    }

    if (route.results.hasPrint) {
      const printBtn = document.createElement("button");
      printBtn.type = "button";
      printBtn.className = "btn btn-secondary btn-small";
      printBtn.appendChild(svgIcon("print", "icon"));
      printBtn.appendChild(document.createTextNode("Print"));
      printBtn.addEventListener("click", onPrint);
      actions.appendChild(printBtn);
    }

    header.appendChild(actions);
    return header;
  }

  function renderEmpty(route, container) {
    container.innerHTML = "";
    container.appendChild(buildHeader(route, () => {}, () => window.print()));
    const body = document.createElement("div");
    body.className = "panel__body";
    body.innerHTML =
      '<p class="results-empty">Enter parameters above and click Calculate to view projection results.</p>';
    container.appendChild(body);
    // Hide output controls in the empty state per spec.
    container.querySelectorAll(".panel__header-actions > *").forEach((el) => el.classList.add("is-hidden"));
  }

  function summaryGridEl(items, values, result) {
    const grid = document.createElement("div");
    grid.className = "summary-grid";
    items.forEach(([label, valueFn]) => {
      const card = document.createElement("div");
      card.className = "summary-card";
      const l = document.createElement("p");
      l.className = "summary-card__label";
      l.textContent = label;
      const v = document.createElement("p");
      v.className = "summary-card__value";
      v.textContent = valueFn(values, result);
      card.appendChild(l);
      card.appendChild(v);
      grid.appendChild(card);
    });
    return grid;
  }

  function detailListEl(items, values, result) {
    const ul = document.createElement("ul");
    ul.className = "detail-list";
    items.forEach(([label, valueFn]) => {
      const li = document.createElement("li");
      const labelText = typeof label === "function" ? label(values, result) : label;
      li.innerHTML = `<span>${labelText}</span><span>${valueFn(values, result)}</span>`;
      ul.appendChild(li);
    });
    return ul;
  }

  function scheduleTableEl(columns, rows) {
    const wrap = document.createElement("div");
    wrap.className = "schedule-wrap";

    const head = document.createElement("div");
    head.className = "schedule-header";
    head.textContent = "Full Schedule";
    wrap.appendChild(head);

    const scroll = document.createElement("div");
    scroll.className = "schedule-scroll";

    const table = document.createElement("table");
    table.className = "schedule-table";

    const thead = document.createElement("thead");
    const headRow = document.createElement("tr");
    columns.forEach((c) => {
      const th = document.createElement("th");
      th.textContent = c;
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    rows.forEach((row) => {
      const tr = document.createElement("tr");
      columns.forEach((c) => {
        const td = document.createElement("td");
        td.textContent = row[c] != null ? row[c] : "";
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    scroll.appendChild(table);
    wrap.appendChild(scroll);
    return wrap;
  }

  function renderResults(route, container, values, result) {
    container.innerHTML = "";
    let scheduleWrap = null;

    const header = buildHeader(
      route,
      (checked) => {
        if (scheduleWrap) scheduleWrap.classList.toggle("is-hidden", !checked);
      },
      () => window.print()
    );
    container.appendChild(header);

    const body = document.createElement("div");
    body.className = "panel__body";
    const cfg = route.results;

    if (cfg.dynamicTitle) {
      const h = document.createElement("h3");
      h.className = "results-title";
      h.textContent = cfg.dynamicTitle;
      body.appendChild(h);
    }

    if (cfg.narrative) {
      const p = document.createElement("p");
      p.className = "results-narrative";
      p.textContent = cfg.narrative(values, result);
      body.appendChild(p);
    }

    if (cfg.disclaimer) {
      const p = document.createElement("p");
      p.className = "results-disclaimer";
      p.textContent = cfg.disclaimer;
      body.appendChild(p);
    }

    if (cfg.summaryGrid) {
      body.appendChild(summaryGridEl(cfg.summaryGrid, values, result));
    }

    if (cfg.specifications) {
      const h = document.createElement("p");
      h.className = "results-section-heading";
      h.textContent = "Specifications";
      body.appendChild(h);
      body.appendChild(detailListEl(cfg.specifications, values, result));
    }

    if (cfg.resultsList) {
      const h = document.createElement("p");
      h.className = "results-section-heading";
      h.textContent = "Results";
      body.appendChild(h);
      body.appendChild(detailListEl(cfg.resultsList, values, result));
    }

    if (cfg.highlightedYield) {
      const grid = document.createElement("div");
      grid.className = "summary-grid";
      const card = document.createElement("div");
      card.className = "summary-card is-highlighted";
      card.innerHTML =
        '<p class="summary-card__label">Annual Percentage Yield</p>' +
        `<p class="summary-card__value">${cfg.highlightedYield(values, result)}</p>`;
      grid.appendChild(card);
      body.appendChild(grid);
    }

    if (cfg.calculationDetails) {
      const h = document.createElement("p");
      h.className = "results-section-heading";
      h.textContent = "Calculation Details";
      body.appendChild(h);
      const list = cfg.calculationDetails(values, result);
      body.appendChild(detailListEl(list.map(([l, v]) => [l, () => v]), values, result));

      if (cfg.tieredBreakdown) {
        const tiers = cfg.tieredBreakdown(values, result) || [];
        const ul = document.createElement("ul");
        ul.className = "detail-list";
        tiers.forEach((t) => {
          const li = document.createElement("li");
          li.innerHTML = `<span>${t.label}</span><span>${t.rate}</span>`;
          ul.appendChild(li);
        });
        body.appendChild(ul);
      }
    }

    if (cfg.singleCard) {
      const [label, valueFn] = cfg.singleCard;
      const grid = document.createElement("div");
      grid.className = "summary-grid";
      const card = document.createElement("div");
      card.className = "summary-card";
      card.innerHTML =
        `<p class="summary-card__label">${label}</p>` +
        `<p class="summary-card__value">${valueFn(values, result)}</p>`;
      grid.appendChild(card);
      body.appendChild(grid);
    }

    if (cfg.milestoneTable && result[cfg.milestoneTable.rowsKey]) {
      const h = document.createElement("p");
      h.className = "results-section-heading";
      h.textContent = "Milestones";
      body.appendChild(h);
      body.appendChild(scheduleTableEl(cfg.milestoneTable.columns, result[cfg.milestoneTable.rowsKey]));
    }

    if (cfg.hasFullSchedule && cfg.scheduleColumns && result.schedule) {
      const marginWrap = document.createElement("div");
      marginWrap.style.marginTop = "16px";
      scheduleWrap = scheduleTableEl(cfg.scheduleColumns, result.schedule);
      marginWrap.appendChild(scheduleWrap);
      body.appendChild(marginWrap);
    }

    container.appendChild(body);
  }

  return { renderEmpty, renderResults };
})();
</script>

<script>
// Wires the route sidebar to the form + results renderers.

(function () {
  const routeSidebar = document.getElementById("routeSidebar");
  const inputPanel = document.getElementById("inputPanel");
  const resultsPanel = document.getElementById("resultsPanel");

  let activeRouteId = ROUTES[0].id;

  function renderSidebar() {
    routeSidebar.innerHTML = "";
    ROUTES.forEach((route) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "route-sidebar__item" + (route.id === activeRouteId ? " is-active" : "");
      btn.innerHTML =
        `<span class="route-sidebar__item-title">${route.navTitle}</span>` +
        `<span class="route-sidebar__item-sub">${route.navSubtitle}</span>`;
      btn.addEventListener("click", () => selectRoute(route.id));
      routeSidebar.appendChild(btn);
    });
  }

  function selectRoute(routeId) {
    activeRouteId = routeId;
    renderSidebar();
    const route = ROUTES.find((r) => r.id === routeId);
    ResultsRenderer.renderEmpty(route, resultsPanel);
    const formHandle = FormRenderer.render(route, inputPanel, (values) => {
      const result = Calc.compute(route.id, values);
      formHandle.allFieldConfigs().forEach((cfg) => {
        if (cfg.autoFillFrom && result[cfg.autoFillFrom] != null) {
          formHandle.setFieldValue(cfg.id, Number(result[cfg.autoFillFrom]).toFixed(2));
        }
      });
      const refreshedValues = formHandle.getValues();
      ResultsRenderer.renderResults(route, resultsPanel, refreshedValues, result);
    });
  }

  renderSidebar();
  selectRoute(activeRouteId);
})();
</script>
</body>
